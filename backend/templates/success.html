{% extends 'base.html' %}

{% block content %}

<div class="card p-5 shadow text-center col-md-6 mx-auto">

    <h2 class="text-success"> Booking Confirmed</h2>

    <hr>

    <p><strong>Parking Lot:</strong> {{ booking.parking_lot.name }}</p>
    <p><strong>Slot:</strong> {{ booking.slot_number }}</p>
    <p><strong>Duration:</strong> {{ booking.duration }} hrs</p>
    <p><strong>Fee:</strong> ₹ {{ booking.predicted_fee }}</p>

    <h5 class="mt-4">QR Code</h5>

    <!-- QR IMAGE -->
    <img id="qrImage" src="data:image/png;base64,{{ booking.qr_code }}" width="180">

    <!-- DOWNLOAD BUTTON -->
    <div class="mt-3">
        <a id="downloadBtn" class="btn btn-success" download="parking_qr.png">
            ⬇ Download QR
        </a>
    </div>

    <!-- NAV BUTTON -->
    <a href="/api/history-page/" class="btn btn-primary mt-3">View History</a>

</div>

<!-- SCRIPT -->
<script>
    const qrImg = document.getElementById("qrImage");
    const downloadBtn = document.getElementById("downloadBtn");

    if (qrImg && downloadBtn) {
        downloadBtn.href = qrImg.src;
    }
</script>

{% endblock %}
